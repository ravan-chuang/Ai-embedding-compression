services:
  retrieval-api:
    build:
      context: .
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      ARTIFACT_DIR: artifacts/fiqa_ivfpq_m96
    # Keeps the downloaded FiQA source data across image/container rebuilds.
    volumes:
      - fiqa-cache:/app/data

volumes:
  fiqa-cache:
